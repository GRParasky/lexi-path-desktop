      <stop offset="0%" stop-color="#863bff"/>
      <stop offset="100%" stop-color="#7e14ff"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede6ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#47bfff" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
