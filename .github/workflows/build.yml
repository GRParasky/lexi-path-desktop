name: Build & Release

# Runs on every version tag push (e.g. git tag v1.0.1 && git push origin v1.0.1)
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false   # if one OS fails, keep building the other two
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    # Force bash on all runners (including Windows, which uses PowerShell by default).
    # Git Bash is pre-installed on windows-latest.
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # -------------------------------------------------------------------------
      # Step 1 — Python dependencies
      # -------------------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pyinstaller

      # -------------------------------------------------------------------------
      # Step 2 — React frontend
      # -------------------------------------------------------------------------
      - name: Build React frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # -------------------------------------------------------------------------
      # Step 3 — Django static files
      # -------------------------------------------------------------------------
      - name: Collect Django static files
        env:
          SECRET_KEY: build-placeholder
        run: |
          cd backend
          python manage.py collectstatic --noinput --clear -v 0

      # -------------------------------------------------------------------------
      # Step 4 — PyInstaller
      # -------------------------------------------------------------------------
      - name: Install UPX (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y upx-ucl

      - name: Bundle Python backend (PyInstaller)
        env:
          SECRET_KEY: build-placeholder
        run: |
          cd backend
          pyinstaller lexi-path-server.spec --noconfirm

      # -------------------------------------------------------------------------
      # Step 5 — Electron: install deps
      # -------------------------------------------------------------------------
      - name: Install Electron dependencies
        run: |
          cd electron
          npm ci

      # -------------------------------------------------------------------------
      # Step 6 — electron-builder: package + publish to GitHub Releases
      #
      # VERSION strips the leading "v" from the tag (v1.0.1 → 1.0.1) and passes
      # it to electron-builder so the built app version matches the git tag.
      # This means you never need to manually bump package.json before tagging.
      #
      # --publish always: creates the GitHub Release (as a draft) if it doesn't
      # exist yet, then uploads the artifact. All three OS jobs upload to the
      # same release — GitHub handles concurrent uploads without conflicts.
      # -------------------------------------------------------------------------
      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd electron
          npx electron-builder --publish always --config.extraMetadata.version=$VERSION

  # ---------------------------------------------------------------------------
  # Finalize: runs after ALL three build jobs succeed.
  # Sets a user-friendly release description and publishes the draft.
  # ---------------------------------------------------------------------------
  finalize:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish release with download instructions
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cat > /tmp/release-notes.md << EOF
          ## Download LexiPath ${VERSION}

          | Platform | Download |
          |----------|----------|
          | 🪟 Windows | [LexiPath-Setup-${VERSION}.exe](https://github.com/GRParasky/lexi-path-desktop/releases/download/v${VERSION}/LexiPath-Setup-${VERSION}.exe) |
          | 🍎 macOS (Apple Silicon) | [LexiPath-${VERSION}-arm64.dmg](https://github.com/GRParasky/lexi-path-desktop/releases/download/v${VERSION}/LexiPath-${VERSION}-arm64.dmg) |
          | 🐧 Linux | [LexiPath-${VERSION}.AppImage](https://github.com/GRParasky/lexi-path-desktop/releases/download/v${VERSION}/LexiPath-${VERSION}.AppImage) |

          ### Windows
          Run \`LexiPath-Setup-${VERSION}.exe\` and follow the installer.

          ### macOS
          Open \`LexiPath-${VERSION}-arm64.dmg\`, drag LexiPath to Applications.

          ### Linux
          \`\`\`bash
          chmod +x LexiPath-${VERSION}.AppImage
          ./LexiPath-${VERSION}.AppImage
          \`\`\`
          EOF

          gh release edit "v${VERSION}" \
            --repo GRParasky/lexi-path-desktop \
            --draft=false \
            --notes-file /tmp/release-notes.md
